apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
      - name: wordpress
        image: 969318514380.dkr.ecr.ap-south-1.amazonaws.com/rajiv-wordpress:latest
        ports:
        - containerPort: 80
        env:
        - name: WORDPRESS_DB_HOST
          value: "wordpress-eks-db.cvfflefrz1xy.ap-south-1.rds.amazonaws.com"
        - name: WORDPRESS_DB_USER
          value: "wordpressadmin"
        - name: WORDPRESS_DB_PASSWORD
          value: "Wordpress123!"
        - name: WORDPRESS_DB_NAME
          value: "wordpress"
