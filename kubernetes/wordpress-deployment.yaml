apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress-deployment
  labels:
    app: wordpress
    version: v2    
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: wordpress
          image: 969318514380.dkr.ecr.ap-south-1.amazonaws.com/rajiv-wordpress:fixed
          ports:
            - containerPort: 80
          env:
            - name: WORDPRESS_DB_HOST
              value: "wordpress-eks-db.cvfflefrz1xy.ap-south-1.rds.amazonaws.com"
            - name: WORDPRESS_DB_USER
              value: "wordpressadmin"
            - name: WORDPRESS_DB_PASSWORD
              value: "Wordpress1234!"
            - name: WORDPRESS_DB_NAME
              value: "wordpress"
