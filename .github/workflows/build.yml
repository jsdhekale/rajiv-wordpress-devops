name: Build and Push Photo API Image

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: photo-api

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ap-south-1

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 969318514380.dkr.ecr.ap-south-1.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t photo-api ./photo-api

      - name: Tag image
        run: |
          docker tag photo-api:latest 969318514380.dkr.ecr.ap-south-1.amazonaws.com/photo-api:dev

      - name: Push image
        run: |
          docker push 969318514380.dkr.ecr.ap-south-1.amazonaws.com/photo-api:dev