name: Build and Push Photo API Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t photo-api ./photo-api

      - name: Tag Docker image
        run: docker tag photo-api:latest 969318514380.dkr.ecr.ap-south-1.amazonaws.com/photo-api:dev

      - name: Push Docker image to ECR
        run: docker push 969318514380.dkr.ecr.ap-south-1.amazonaws.com/photo-api:dev